name: 🚀 CI/CD workflow

on:
  push:
    branches:
      - main
      - feat/*
      - chore/*
  pull_request:
    branches:
      - main

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tests_passed: ${{ steps.test-status.outputs.tests_passed }}
    env:
      ConnectionStrings__openai: ${{ secrets.OPENAI_CONNECTION_STRING }}
      ApplicationInsights__ConnectionString: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}

    steps:
    - name: 🧑‍💻 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔧 Set Up .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'

    - name: 🔐 Trust ASP.NET Core Developer Certificate
      run: dotnet dev-certs https --trust

    - name: 🛠️ Install azd
      uses: Azure/setup-azd@v2

    - name: 🛠️ Install trx2junit Tool
      if: github.event_name == 'pull_request'
      run: dotnet tool install --global trx2junit
      
    - name: 📦 Restore Dependencies
      run: dotnet restore

    - name: 🏗️ Build Project
      run: dotnet build --configuration Release
        
    - name: 🧪 Run All Tests
      id: run-tests
      run: |
        mkdir -p ./test-results
        all_tests_passed=true
        
        for proj in $(find test -name "*.csproj"); do
          proj_name=$(basename $proj .csproj)
          if ! dotnet test "$proj" --configuration Release --logger "trx;LogFileName=${proj_name}.trx" --results-directory ./test-results; then
            all_tests_passed=false
          fi
        done
        
        echo "all_tests_passed=${all_tests_passed}" >> $GITHUB_OUTPUT
      shell: bash

    - name: 📊 Set Test Status
      id: test-status
      run: |
        if [ "${{ steps.run-tests.outputs.all_tests_passed }}" == "true" ]; then
          echo "tests_passed=true" >> $GITHUB_OUTPUT
        else
          echo "tests_passed=false" >> $GITHUB_OUTPUT
          echo "❌ Some tests failed. Deployment will be skipped."
        fi

    - name: 🔄 Convert Test Results to JUnit Format
      if: github.event_name == 'pull_request'
      run: find ./test-results -name '*.trx' -exec trx2junit {} \;

    - name: 📑 Publish Test Results as PR Comment
      if: github.event_name == 'pull_request'
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: '**/test-results/*.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: ✅ Add Check Comments for Failed Code Lines
      if: github.event_name == 'pull_request'
      uses: mikepenz/action-junit-report@v3
      with:
        report_paths: '**/test-results/*.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🚀 Log in with Azure (Federated Credentials)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        azd auth login `
          --client-id "$Env:AZURE_CLIENT_ID" `
          --federated-credential-provider "github" `
          --tenant-id "$Env:AZURE_TENANT_ID"

    - name: 🔑 Azure CLI 로그인
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      uses: azure/login@v1
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    - name: 🏗️ Provision Infrastructure
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      run: azd provision --no-prompt
      env:
        AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}

    - name: 🔧 Set Azure Environment Variables
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        azd env set ConnectionStrings__openai "$Env:ConnectionStrings__openai"
        azd env set ApplicationInsights__ConnectionString "$Env:ApplicationInsights__ConnectionString"
        azd env set APPLICATIONINSIGHTS_CONNECTION_STRING "$Env:ApplicationInsights__ConnectionString"

    - name: 🚢 Deploy Application
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      run: azd deploy --no-prompt
      env:
        ApplicationInsights__ConnectionString: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}

    - name: 🔧 직접 Container Apps 환경 변수 설정
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        # 환경 변수 및 계정 정보 확인
        $resourceGroupName = "$Env:rg-AZURE_ENV_NAME"
        $subscriptionId = "$Env:AZURE_SUBSCRIPTION_ID"
        
        Write-Host "🔍 환경 정보 확인: AZURE_ENV_NAME=$Env:AZURE_ENV_NAME, AZURE_SUBSCRIPTION_ID=$subscriptionId"
        Write-Host "🔍 리소스 그룹: $resourceGroupName"
        
        # Azure CLI 인증 및 구독 상태 확인
        Write-Host "🔒 Azure CLI 인증 상태 확인 중..."
        $account = az account show --output json | ConvertFrom-Json
        Write-Host "✅ Azure 계정 로그인됨: $($account.name)"
        Write-Host "🔄 현재 구독: $($account.id)"
        
        # 리소스 그룹 존재 여부 확인
        Write-Host "🔍 리소스 그룹 존재 여부 확인 중..."
        $rgExists = (az group exists --name $resourceGroupName) -eq "true"
        
        if (-not $rgExists) {
          Write-Host "⚠️ 리소스 그룹 '$resourceGroupName'이(가) 없습니다. 실제 리소스 그룹 목록을 확인합니다."
          $groups = az group list --query "[].name" -o tsv
          Write-Host "📋 존재하는 리소스 그룹 목록:"
          Write-Host $groups
          
          # 가장 유사한 이름의 리소스 그룹 찾기
          $possibleGroups = $groups -split "`n" | Where-Object { $_ -like "*$Env:AZURE_ENV_NAME*" -or $_ -like "*interview*" -or $_ -like "*capstone*" }
          
          if ($possibleGroups) {
            Write-Host "💡 가능한 관련 리소스 그룹 발견:"
            foreach ($g in $possibleGroups) {
              Write-Host "   - $g"
            }
            # 첫 번째로 발견된 관련 그룹 사용
            Write-Host "✅ 발견된 리소스 그룹을 사용합니다: $resourceGroupName"
          } else {
            Write-Host "❌ 관련된 리소스 그룹을 찾을 수 없습니다."
            exit 0  # 오류로 빌드를 실패시키지 않고 경고만 출력
          }
        } else {
          Write-Host "✅ 리소스 그룹 '$resourceGroupName' 존재함"
        }
        
        # 실제 컨테이너 앱 목록 확인
        Write-Host "📋 리소스 그룹 '$resourceGroupName'의 Container Apps 목록 조회 중..."
        $containerAppsJson = az containerapp list --resource-group $resourceGroupName 2>$null
        
        if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrEmpty($containerAppsJson)) {
          Write-Host "❓ Container Apps를 찾을 수 없습니다. Container Apps Environment를 확인합니다."
          $envs = az containerapp env list --resource-group $resourceGroupName --query "[].name" -o tsv 2>$null
          
          if (-not [string]::IsNullOrEmpty($envs)) {
            Write-Host "📋 발견된 Container Apps Environment: $envs"
          } else {
            Write-Host "❌ Container Apps Environment도 없습니다. 아직 배포가 완료되지 않았을 수 있습니다."
            exit 0  # 오류로 빌드를 실패시키지 않고 경고만 출력
          }
          exit 0
        }
        
        $containerApps = ($containerAppsJson | ConvertFrom-Json) | ForEach-Object { $_.name }
        
        if (-not $containerApps -or $containerApps.Count -eq 0) {
          Write-Host "❌ 컨테이너 앱이 없습니다."
          exit 0
        }
        
        Write-Host "📋 발견된 Container Apps: $containerApps"
        
        # 각 컨테이너 앱에 환경 변수 설정
        foreach ($app in $containerApps) {
          if (![string]::IsNullOrWhiteSpace($app)) {
            Write-Host "🔧 앱 '$app' 환경 변수 설정 중..."
            
            # 기존 환경 변수 확인 (디버깅 목적)
            $currentVars = az containerapp show --name $app --resource-group $resourceGroupName --query "properties.configuration.ingress.targetPort" -o tsv
            Write-Host "   현재 포트: $currentVars"
            
            # 환경 변수 설정
            $result = az containerapp update --name $app --resource-group $resourceGroupName --set-env-vars "APPLICATIONINSIGHTS_CONNECTION_STRING=$Env:APPLICATIONINSIGHTS_CONNECTION_STRING" "ApplicationInsights__ConnectionString=$Env:ApplicationInsights__ConnectionString" "ConnectionStrings__openai=$Env:ConnectionStrings__openai" 2>&1
            
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ '$app' 환경 변수 설정 성공"
            } else {
              Write-Host "❌ '$app' 환경 변수 설정 실패: $result"
            }
          }
        }
      env:
        ApplicationInsights__ConnectionString: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        ConnectionStrings__openai: ${{ secrets.OPENAI_CONNECTION_STRING }}
