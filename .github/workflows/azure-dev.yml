name: 🚀 CI/CD workflow

on:
  push:
    branches:
      - main
      - feat/*
      - chore/*
  pull_request:
    branches:
      - main

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tests_passed: ${{ steps.test-status.outputs.tests_passed }}
    env:
      ConnectionStrings__openai: ${{ secrets.OPENAI_CONNECTION_STRING }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}

    steps:
    - name: 🧑‍💻 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔧 Set Up .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'

    - name: 🔐 Trust ASP.NET Core Developer Certificate
      run: dotnet dev-certs https --trust

    - name: 🛠️ Install azd
      uses: Azure/setup-azd@v2

    - name: 🛠️ Install trx2junit Tool
      if: github.event_name == 'pull_request'
      run: dotnet tool install --global trx2junit
      
    - name: 📦 Restore Dependencies
      run: dotnet restore
        
    - name: 🔧 Configure Test Environment Variables
      run: |
        # 테스트용 환경 변수 설정
        echo "APPLICATIONINSIGHTS_CONNECTION_STRING=InstrumentationKey=00000000-0000-0000-0000-000000000000;IngestionEndpoint=https://example.com" >> $GITHUB_ENV
        echo "EnableAzureMonitoring=false" >> $GITHUB_ENV
        echo "IsTestEnvironment=true" >> $GITHUB_ENV
        
    - name: 🏗️ Build Project
      run: dotnet build --configuration Release
        
    - name: 🧪 Run All Tests
      id: run-tests
      run: |
        mkdir -p ./test-results
        all_tests_passed=true
        
        for proj in $(find test -name "*.csproj"); do
          proj_name=$(basename $proj .csproj)
          if ! dotnet test "$proj" --configuration Release --logger "trx;LogFileName=${proj_name}.trx" --results-directory ./test-results; then
            all_tests_passed=false
          fi
        done
        
        echo "all_tests_passed=${all_tests_passed}" >> $GITHUB_OUTPUT
      shell: bash

    - name: 📊 Set Test Status
      id: test-status
      run: |
        if [ "${{ steps.run-tests.outputs.all_tests_passed }}" == "true" ]; then
          echo "tests_passed=true" >> $GITHUB_OUTPUT
        else
          echo "tests_passed=false" >> $GITHUB_OUTPUT
          echo "❌ Some tests failed. Deployment will be skipped."
        fi

    - name: 🔄 Convert Test Results to JUnit Format
      if: github.event_name == 'pull_request'
      run: find ./test-results -name '*.trx' -exec trx2junit {} \;

    - name: 📑 Publish Test Results as PR Comment
      if: github.event_name == 'pull_request'
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: '**/test-results/*.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: ✅ Add Check Comments for Failed Code Lines
      if: github.event_name == 'pull_request'
      uses: mikepenz/action-junit-report@v3
      with:
        report_paths: '**/test-results/*.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🚀 Log in with Azure (Federated Credentials)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        azd auth login `
          --client-id "$Env:AZURE_CLIENT_ID" `
          --federated-credential-provider "github" `
          --tenant-id "$Env:AZURE_TENANT_ID"

    - name: 🏗️ Provision Infrastructure
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      run: azd provision --no-prompt
      env:
        AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}

    - name: 🔧 Set Azure Environment Variables
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        azd env set ConnectionStrings__openai "$Env:ConnectionStrings__openai"
    
    - name: 🚢 Deploy Application
      id: deploy
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      run: azd up --no-prompt
      env:
        EnableAzureMonitoring: "true"
    
    - name: 🔔 Send Deployment Status to Slack
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()
      shell: pwsh
      run: |
        $slackWebhookUrl = "https://hooks.slack.com/services/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"
        $deploySucess = ${{ steps.deploy.outcome == 'success' }}
        
        $appName = "$Env:AZURE_ENV_NAME"
        $now = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
        
        if ($deploySucess) {
          $status = "✅ 성공"
          $color = "#36a64f"  # 초록색
          $message = "Azure Container App이 성공적으로 배포되었습니다."
        } else {
          $status = "❌ 실패"
          $color = "#ff0000"  # 빨간색
          $message = "Azure Container App 배포 중 오류가 발생했습니다."
        }
        
        $payload = @{
          attachments = @(
            @{
              fallback = "배포 알림: $status"
              color = $color
              pretext = "📢 *Azure 배포 알림*"
              title = "배포 상태: $status"
              text = $message
              fields = @(
                @{
                  title = "앱"
                  value = $appName
                  short = $true
                },
                @{
                  title = "환경"
                  value = "$Env:AZURE_LOCATION"
                  short = $true
                },
                @{
                  title = "배포 시간"
                  value = $now
                  short = $true
                },
                @{
                  title = "배포자"
                  value = "${{ github.actor }}"
                  short = $true
                }
              )
              footer = "GitHub Actions"
              footer_icon = "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
              ts = [Math]::Floor([decimal](Get-Date -UFormat "%s"))
            }
          )
        } | ConvertTo-Json -Depth 4
        
        Invoke-RestMethod -Uri $slackWebhookUrl -Method Post -Body $payload -ContentType "application/json"

    - name: 🔧 Configure Azure Monitor Alerts with Slack
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.deploy.outcome == 'success'
      shell: pwsh
      run: |
        Write-Host "Azure Monitor 알림 구성 중..."
        
        # 필요한 변수 설정
        $rgName = azd env get-values | Where-Object { $_ -like "*AZURE_RESOURCE_GROUP*" } | ForEach-Object { $_.Split("=")[1] }
        $appName = azd env get-values | Where-Object { $_ -like "*AZURE_CONTAINER_APP_NAME*" } | ForEach-Object { $_.Split("=")[1] }
        
        if (-not $appName) {
          # Container App 이름을 직접 조회
          $apps = az containerapp list --resource-group $rgName --query "[].name" -o tsv
          $appName = $apps.Split()[0]
        }
        
        Write-Host "Container App: $appName in $rgName"
        $resourceId = az containerapp show --name $appName --resource-group $rgName --query id -o tsv
        $slackWebhookUrl = "https://hooks.slack.com/services/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"
        
        # 액션 그룹 생성 (Slack 웹훅)
        $actionGroupName = "SlackNotifications"
        az monitor action-group create --resource-group $rgName --name $actionGroupName --short-name "SlackAlert" --webhook-resource-id $slackWebhookUrl
        $actionGroupId = az monitor action-group show --resource-group $rgName --name $actionGroupName --query id -o tsv
        
        # CPU 사용량 알림
        $alertName = "${appName}-cpu-alert"
        az monitor metrics alert create `
          --name $alertName `
          --resource-group $rgName `
          --scopes $resourceId `
          --condition "avg CPU > 75 where TimeGrain = PT1M" `
          --window-size 5m `
          --evaluation-frequency 1m `
          --description "CPU 사용량 75% 초과 알림" `
          --action $actionGroupId
        
        # 메모리 사용량 알림
        $alertName = "${appName}-memory-alert"
        az monitor metrics alert create `
          --name $alertName `
          --resource-group $rgName `
          --scopes $resourceId `
          --condition "avg MemoryWorkingSet > 80 where TimeGrain = PT1M" `
          --window-size 5m `
          --evaluation-frequency 1m `
          --description "메모리 사용량 80% 초과 알림" `
          --action $actionGroupId
          
        # HTTP 오류 응답 알림
        $alertName = "${appName}-http-error-alert"
        az monitor metrics alert create `
          --name $alertName `
          --resource-group $rgName `
          --scopes $resourceId `
          --condition "total HttpResponseErrors > 10 where TimeGrain = PT1M" `
          --window-size 5m `
          --evaluation-frequency 1m `
          --description "HTTP 오류 응답 비율 알림" `
          --action $actionGroupId
        
        Write-Host "Azure Monitor 알림이 Slack 알림과 함께 구성되었습니다."
        
        # Slack으로 알림 설정 완료 메시지 전송
        $payload = @{
          attachments = @(
            @{
              fallback = "모니터링 알림 설정 완료"
              color = "#3AA3E3"
              pretext = "📊 *Azure 모니터링 알림 설정 완료*"
              title = "$appName 애플리케이션의 모니터링 알림이 설정되었습니다"
              text = "다음 이슈 발생 시 이 채널로 자동 알림이 전송됩니다:\n• CPU 사용량 75% 초과\n• 메모리 사용량 80% 초과\n• HTTP 오류 응답 증가"
              fields = @(
                @{
                  title = "앱"
                  value = $appName
                  short = $true
                },
                @{
                  title = "리소스 그룹"
                  value = $rgName
                  short = $true
                }
              )
              footer = "Azure Monitor"
              footer_icon = "https://azure.microsoft.com/svghandler/monitor/?width=300&height=300"
              ts = [Math]::Floor([decimal](Get-Date -UFormat "%s"))
            }
          )
        } | ConvertTo-Json -Depth 4
        
        Invoke-RestMethod -Uri $slackWebhookUrl -Method Post -Body $payload -ContentType "application/json"
