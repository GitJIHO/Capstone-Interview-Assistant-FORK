name: 🚀 CI/CD workflow

on:
  push:
    branches:
      - main
      - feat/*
      - chore/*
  pull_request:
    branches:
      - main

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tests_passed: ${{ steps.test-status.outputs.tests_passed }}
    env:
      ConnectionStrings__openai: ${{ secrets.OPENAI_CONNECTION_STRING }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}

    steps:
    - name: 🧑‍💻 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔧 Set Up .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'

    - name: 🔐 Trust ASP.NET Core Developer Certificate
      run: dotnet dev-certs https --trust

    - name: 🛠️ Install azd
      uses: Azure/setup-azd@v2

    - name: 🛠️ Install trx2junit Tool
      if: github.event_name == 'pull_request'
      run: dotnet tool install --global trx2junit
      
    - name: 📦 Restore Dependencies
      run: dotnet restore
        
    - name: 🔧 Configure Test Environment Variables
      run: |
        # 테스트용 환경 변수 설정
        echo "APPLICATIONINSIGHTS_CONNECTION_STRING=InstrumentationKey=00000000-0000-0000-0000-000000000000;IngestionEndpoint=https://example.com" >> $GITHUB_ENV
        echo "EnableAzureMonitoring=false" >> $GITHUB_ENV

    - name: 🏗️ Build Project
      run: dotnet build --configuration Release
        
    - name: 🧪 Run All Tests
      id: run-tests
      run: |
        mkdir -p ./test-results
        all_tests_passed=true
        
        for proj in $(find test -name "*.csproj"); do
          proj_name=$(basename $proj .csproj)
          if ! dotnet test "$proj" --configuration Release --logger "trx;LogFileName=${proj_name}.trx" --results-directory ./test-results; then
            all_tests_passed=false
          fi
        done
        
        echo "all_tests_passed=${all_tests_passed}" >> $GITHUB_OUTPUT
      shell: bash

    - name: 📊 Set Test Status
      id: test-status
      run: |
        if [ "${{ steps.run-tests.outputs.all_tests_passed }}" == "true" ]; then
          echo "tests_passed=true" >> $GITHUB_OUTPUT
        else
          echo "tests_passed=false" >> $GITHUB_OUTPUT
          echo "❌ Some tests failed. Deployment will be skipped."
        fi

    - name: 🔄 Convert Test Results to JUnit Format
      if: github.event_name == 'pull_request'
      run: find ./test-results -name '*.trx' -exec trx2junit {} \;

    - name: 📑 Publish Test Results as PR Comment
      if: github.event_name == 'pull_request'
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: '**/test-results/*.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: ✅ Add Check Comments for Failed Code Lines
      if: github.event_name == 'pull_request'
      uses: mikepenz/action-junit-report@v3
      with:
        report_paths: '**/test-results/*.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🚀 Log in with Azure (Federated Credentials)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        azd auth login `
          --client-id "$Env:AZURE_CLIENT_ID" `
          --federated-credential-provider "github" `
          --tenant-id "$Env:AZURE_TENANT_ID"

    - name: 🏗️ Provision Infrastructure
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      run: azd provision --no-prompt
      env:
        AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}

    - name: 🔧 Set Azure Environment Variables
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        azd env set ConnectionStrings__openai "$Env:ConnectionStrings__openai"
        
        # Azure Monitor는 실제 배포 환경에서만 활성화
        azd env set EnableAzureMonitoring true
        azd env set AZURE_MONITOR_ENABLE_DASHBOARD true
        azd env set AZURE_MONITOR_ENABLE_TRACING true
        azd env set AZURE_MONITOR_ENABLE_METRICS true
        azd env set AZURE_MONITOR_ENABLE_LOGGING true

    - name: 🚢 Deploy Application
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      run: azd deploy --no-prompt

    - name: 🔧 Verify Azure Monitor Integration
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      uses: azure/login@v2
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    - name: 🔍 Check Application Insights Resources
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        # Application Insights 확장 설치
        Write-Host "Installing Azure Application Insights extension..."
        az extension add --name application-insights --allow-preview true --yes
        
        # 리소스 그룹 확인 - 'rg-' 접두사 추가
        $resourceGroupPrefix = "$Env:AZURE_ENV_NAME"
        $resourceGroup = "rg-$resourceGroupPrefix"
        Write-Host "Expected resource group name: $resourceGroup"
        
        # 사용 가능한 리소스 그룹 나열
        Write-Host "Listing available resource groups:"
        $allGroups = az group list --query "[].name" -o tsv
        $allGroups | ForEach-Object { Write-Host "- $_" }
        
        # Application Insights 리소스 확인 (허용 실패)
        try {
          # 리소스 그룹이 있는지 확인
          $groupCheck = az group exists --name $resourceGroup
          if ($groupCheck -eq "true") {
            Write-Host "✅ Resource group '$resourceGroup' exists"
            
            # 해당 리소스 그룹의 Application Insights 리소스 찾기
            Write-Host "Searching for Application Insights in resource group '$resourceGroup'..."
            $appInsights = az resource list --resource-group $resourceGroup --resource-type "microsoft.insights/components" --query "[].{name:name}" -o tsv
            
            if ($appInsights) {
              Write-Host "✅ Azure Monitor Application Insights successfully provisioned: $appInsights"
            } else {
              Write-Host "⚠️ Application Insights not found in resource group '$resourceGroup'"
              
              # 모든 구독의 Application Insights 리소스 검색
              Write-Host "Searching for Application Insights in all resource groups..."
              $allAppInsights = az resource list --resource-type "microsoft.insights/components" --query "[].{name:name, group:resourceGroup}" -o tsv
              
              if ($allAppInsights) {
                Write-Host "✅ Found Application Insights resources: $allAppInsights"
              } else {
                Write-Host "⚠️ No Application Insights resources found. This may be expected if they haven't been created yet."
              }
            }
          } else {
            Write-Host "⚠️ Resource group '$resourceGroup' not found"
            
            # 이름에 AZURE_ENV_NAME이 포함된 리소스 그룹 검색
            Write-Host "Searching for resource groups with similar names..."
            $similarGroups = az group list --query "[?contains(name,'$resourceGroupPrefix')].name" -o tsv
            
            if ($similarGroups) {
              Write-Host "Found similar resource groups:"
              $similarGroups.Split("`n") | ForEach-Object { Write-Host "- $_" }
              
              # 첫 번째 유사한 그룹에서 검색
              $firstGroup = $similarGroups.Split("`n")[0]
              if ($firstGroup) {
                Write-Host "Checking for Application Insights in group: $firstGroup"
                $appInsights = az resource list --resource-group $firstGroup --resource-type "microsoft.insights/components" --query "[].{name:name}" -o tsv
                
                if ($appInsights) {
                  Write-Host "✅ Found Application Insights in resource group '$firstGroup': $appInsights"
                } else {
                  Write-Host "⚠️ No Application Insights found in resource group '$firstGroup'"
                }
              }
            } else {
              Write-Host "No similar resource groups found."
            }
          }
        } catch {
          Write-Host "⚠️ Error checking Application Insights: $($_.Exception.Message)"
        }
        
        # 완료 메시지
        Write-Host "Verification step completed - deployment was successful even if resources are not yet visible"