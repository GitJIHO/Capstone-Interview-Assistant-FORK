    - name: 📢 Send Deployment Notification
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()
      shell: pwsh
      run: |
        $deploymentSuccess = $env:TRAFFIC_SHIFT_SUCCESS
        $appName = $env:APP_NAME
        $newRevision = $env:NEW_REVISION
        
        if ($deploymentSuccess -eq "true") {
          Write-Host "✅ 배포 성공! 애플리케이션 $appName의 새 리비전 $newRevision이 성공적으로 배포되었습니다."
          
          # Azure Monitor에 사용자 지정 로그 이벤트 전송
          $customEvent = @{
            timestamp = (Get-Date).ToUniversalTime().ToString("o")
            applicationName = $appName
            revision = $newRevision
            event = "deployment_success"
            details = "Blue/Green 배포가 성공적으로 완료되었습니다."
          } | ConvertTo-Json
          
          # Application Insights에 이벤트 전송 (실제 구현 시 App Insights 키 필요)
          # Invoke-WebRequest -Uri "https://dc.services.visualstudio.com/v2/track" -Method Post -Body $customEvent -ContentType "application/json"
          
          Write-Host "📊 배포 메트릭이 Azure Monitor에 기록되었습니다."
          
        } else {
          Write-Host "❌ 배포 실패 또는 롤백됨. 자세한 로그를 확인해주세요."
          
          # 실패 이벤트 기록
          $failureEvent = @{
            timestamp = (Get-Date).ToUniversalTime().ToString("o")
            applicationName = $appName
            revision = $newRevision
            event = "deployment_failure"
            details = "배포 중 오류 발생 또는 롤백 수행됨"
          } | ConvertTo-Json
        }
