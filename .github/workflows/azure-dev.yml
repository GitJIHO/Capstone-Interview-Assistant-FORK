name: 🚀 CI/CD workflow

on:
  push:
    branches:
      - main
      - feat/*
      - chore/*
  pull_request:
    branches:
      - main

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tests_passed: ${{ steps.test-status.outputs.tests_passed }}
    env:
      ConnectionStrings__openai: ${{ secrets.OPENAI_CONNECTION_STRING }}
      ApplicationInsights__ConnectionString: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}

    steps:
    - name: 🧑‍💻 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔧 Set Up .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'

    - name: 🔐 Trust ASP.NET Core Developer Certificate
      run: dotnet dev-certs https --trust

    - name: 🛠️ Install azd
      uses: Azure/setup-azd@v2

    - name: 🛠️ Install trx2junit Tool
      if: github.event_name == 'pull_request'
      run: dotnet tool install --global trx2junit
      
    - name: 📦 Restore Dependencies
      run: dotnet restore

    - name: 🏗️ Build Project
      run: dotnet build --configuration Release
        
    - name: 🧪 Run All Tests
      id: run-tests
      run: |
        mkdir -p ./test-results
        all_tests_passed=true
        
        for proj in $(find test -name "*.csproj"); do
          proj_name=$(basename $proj .csproj)
          if ! dotnet test "$proj" --configuration Release --logger "trx;LogFileName=${proj_name}.trx" --results-directory ./test-results; then
            all_tests_passed=false
          fi
        done
        
        echo "all_tests_passed=${all_tests_passed}" >> $GITHUB_OUTPUT
      shell: bash

    - name: 📊 Set Test Status
      id: test-status
      run: |
        if [ "${{ steps.run-tests.outputs.all_tests_passed }}" == "true" ]; then
          echo "tests_passed=true" >> $GITHUB_OUTPUT
        else
          echo "tests_passed=false" >> $GITHUB_OUTPUT
          echo "❌ Some tests failed. Deployment will be skipped."
        fi

    - name: 🔄 Convert Test Results to JUnit Format
      if: github.event_name == 'pull_request'
      run: find ./test-results -name '*.trx' -exec trx2junit {} \;

    - name: 📑 Publish Test Results as PR Comment
      if: github.event_name == 'pull_request'
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: '**/test-results/*.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: ✅ Add Check Comments for Failed Code Lines
      if: github.event_name == 'pull_request'
      uses: mikepenz/action-junit-report@v3
      with:
        report_paths: '**/test-results/*.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🚀 Log in with Azure (Federated Credentials)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        azd auth login `
          --client-id "$Env:AZURE_CLIENT_ID" `
          --federated-credential-provider "github" `
          --tenant-id "$Env:AZURE_TENANT_ID"

    - name: ⚙️ 디버그: Azure Developer CLI 버전 및 상태 확인
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        Write-Host "🔍 azd 버전: $(azd version)"
        Write-Host "📂 현재 디렉토리: $(Get-Location)"
        Write-Host "📄 파일 목록:"
        Get-ChildItem -Force
        if (Test-Path azure.yaml) {
          Write-Host "✅ azure.yaml 파일 존재"
          Get-Content azure.yaml
        } else {
          Write-Host "❌ azure.yaml 파일 없음"
        }

    - name: 🏗️ Azure Developer CLI 프로젝트 초기화 (필요한 경우)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        # azure.yaml 파일이 없거나 azd 프로젝트가 인식되지 않는 경우
        if (-not (Test-Path azure.yaml)) {
          Write-Host "🔧 Azure Developer CLI 프로젝트 초기화 중..."
          # 환경 이름 설정
          azd env new "$Env:AZURE_ENV_NAME" --no-prompt
          
          # 기존 환경 구성 적용 (있는 경우)
          if (-not [string]::IsNullOrEmpty("$Env:AZD_INITIAL_ENVIRONMENT_CONFIG")) {
            Write-Host "⚙️ 기존 환경 구성 적용 중..."
            $Env:AZD_INITIAL_ENVIRONMENT_CONFIG | Out-File -FilePath temp_config.json
            azd env set -f temp_config.json
            Remove-Item temp_config.json
          }
          
          # 환경 변수 설정
          azd env set ConnectionStrings__openai "$Env:ConnectionStrings__openai"
          azd env set ApplicationInsights__ConnectionString "$Env:ApplicationInsights__ConnectionString"
          azd env set APPLICATIONINSIGHTS_CONNECTION_STRING "$Env:APPLICATIONINSIGHTS_CONNECTION_STRING"
          
          Write-Host "✅ 환경 초기화 완료"
        }

    - name: 🏗️ Provision Infrastructure
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        Write-Host "🔧 Azure 인프라 프로비저닝 중..."
        # 리소스 그룹이 존재하지 않으면 생성
        $resourceGroup = "$Env:AZURE_ENV_NAME-rg"
        $location = "$Env:AZURE_LOCATION"
        
        # 리소스 그룹 확인 및 생성
        $rgExists = $(az group exists --name $resourceGroup)
        if ($rgExists -eq "false") {
          Write-Host "📦 리소스 그룹 '$resourceGroup' 생성 중..."
          az group create --name $resourceGroup --location $location
        } else {
          Write-Host "✅ 리소스 그룹 '$resourceGroup' 이미 존재함"
        }
        
        # Container Apps 환경 확인 및 생성
        $caEnv = "$Env:AZURE_ENV_NAME"
        $caEnvExists = $(az containerapp env list --resource-group $resourceGroup --query "[?name=='$caEnv'].name" -o tsv)
        if ([string]::IsNullOrEmpty($caEnvExists)) {
          Write-Host "🌐 Container Apps 환경 '$caEnv' 생성 중..."
          az containerapp env create --name $caEnv --resource-group $resourceGroup --location $location
        } else {
          Write-Host "✅ Container Apps 환경 '$caEnv' 이미 존재함"
        }
      env:
        AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}

    - name: 🔧 Set Azure Environment Variables
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        # 디버그: AZD 환경 변수 확인
        Write-Host "🔍 AZD 현재 환경 변수 목록:"
        azd env get-values
        
        # 환경 변수 설정
        azd env set ConnectionStrings__openai "$Env:ConnectionStrings__openai"
        azd env set ApplicationInsights__ConnectionString "$Env:ApplicationInsights__ConnectionString"
        azd env set APPLICATIONINSIGHTS_CONNECTION_STRING "$Env:APPLICATIONINSIGHTS_CONNECTION_STRING"
        
        # 설정 후 다시 확인
        Write-Host "🔍 AZD 환경 변수 설정 후 목록:"
        azd env get-values
        
        # 환경 확인
        Write-Host "🔍 AZD 환경 정보:"
        azd env show

    - name: 🚢 Deploy Application
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      run: |
        echo "::debug::환경 변수 설정 확인: APPLICATIONINSIGHTS_CONNECTION_STRING 존재 여부: $(if [[ -n \"$APPLICATIONINSIGHTS_CONNECTION_STRING\" ]]; then echo 'YES'; else echo 'NO'; fi)"
        azd deploy --no-prompt
      env:
        # 배포 명령에서도 환경 변수 직접 전달 (중요)
        APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        ApplicationInsights__ConnectionString: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}

    - name: 🔧 직접 Container Apps 환경 변수 설정
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        # 현재 리소스 그룹 이름과 컨테이너 앱 이름 가져오기
        $resourceGroup = "$Env:AZURE_ENV_NAME-rg"
        $webApp = "webfrontend"
        $apiApp = "apiservice"
        
        Write-Host "🔍 리소스 그룹: $resourceGroup, 웹앱: $webApp, API앱: $apiApp"
        
        # Application Insights 연결 문자열 마스킹 (로그 출력용)
        $connStr = "$Env:APPLICATIONINSIGHTS_CONNECTION_STRING"
        if ($connStr -match "InstrumentationKey=([^;]+)") {
            $key = $matches[1]
            $maskedKey = $key.Substring(0,4) + "..." + $key.Substring($key.Length-4)
            $maskedConnStr = $connStr -replace $key, $maskedKey
        } else {
            $maskedConnStr = "[마스킹 실패]"
        }
        
        Write-Host "📝 환경 변수 설정 중... (마스킹됨): $maskedConnStr"
        
        # 웹프론트엔드 앱 환경 변수 설정
        az containerapp env var set --name $webApp --resource-group $resourceGroup --vars "APPLICATIONINSIGHTS_CONNECTION_STRING=$Env:APPLICATIONINSIGHTS_CONNECTION_STRING" "ApplicationInsights__ConnectionString=$Env:APPLICATIONINSIGHTS_CONNECTION_STRING"
        if ($LASTEXITCODE -eq 0) { Write-Host "✅ $webApp 환경 변수 설정 성공" } else { Write-Host "❌ $webApp 환경 변수 설정 실패" }
        
        # API 서비스 앱 환경 변수 설정
        az containerapp env var set --name $apiApp --resource-group $resourceGroup --vars "APPLICATIONINSIGHTS_CONNECTION_STRING=$Env:APPLICATIONINSIGHTS_CONNECTION_STRING" "ApplicationInsights__ConnectionString=$Env:APPLICATIONINSIGHTS_CONNECTION_STRING"
        if ($LASTEXITCODE -eq 0) { Write-Host "✅ $apiApp 환경 변수 설정 성공" } else { Write-Host "❌ $apiApp 환경 변수 설정 실패" }
