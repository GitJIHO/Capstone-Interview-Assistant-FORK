name: 🚀 CI/CD workflow

on:
  push:
    branches:
      - main
      - feat/*
      - chore/*
  pull_request:
    branches:
      - main

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tests_passed: ${{ steps.test-status.outputs.tests_passed }}
    env:
      ConnectionStrings__openai: ${{ secrets.OPENAI_CONNECTION_STRING }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}

    steps:
    - name: 🧑‍💻 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔧 Set Up .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'

    - name: 🔐 Trust ASP.NET Core Developer Certificate
      run: dotnet dev-certs https --trust

    - name: 🛠️ Install azd
      uses: Azure/setup-azd@v2

    - name: 🛠️ Install trx2junit Tool
      if: github.event_name == 'pull_request'
      run: dotnet tool install --global trx2junit
      
    - name: 📦 Restore Dependencies
      run: dotnet restore
        
    - name: 🔧 Configure Test Environment Variables
      run: |
        # 테스트용 환경 변수 설정
        echo "APPLICATIONINSIGHTS_CONNECTION_STRING=InstrumentationKey=00000000-0000-0000-0000-000000000000;IngestionEndpoint=https://example.com" >> $GITHUB_ENV
        echo "EnableAzureMonitoring=false" >> $GITHUB_ENV
        echo "IsTestEnvironment=true" >> $GITHUB_ENV
        
    - name: 🏗️ Build Project
      run: dotnet build --configuration Release
        
    - name: 🧪 Run All Tests
      id: run-tests
      run: |
        mkdir -p ./test-results
        all_tests_passed=true
        
        for proj in $(find test -name "*.csproj"); do
          proj_name=$(basename $proj .csproj)
          if ! dotnet test "$proj" --configuration Release --logger "trx;LogFileName=${proj_name}.trx" --results-directory ./test-results; then
            all_tests_passed=false
          fi
        done
        
        echo "all_tests_passed=${all_tests_passed}" >> $GITHUB_OUTPUT
      shell: bash

    - name: 📊 Set Test Status
      id: test-status
      run: |
        if [ "${{ steps.run-tests.outputs.all_tests_passed }}" == "true" ]; then
          echo "tests_passed=true" >> $GITHUB_OUTPUT
        else
          echo "tests_passed=false" >> $GITHUB_OUTPUT
          echo "❌ Some tests failed. Deployment will be skipped."
        fi

    - name: 🔄 Convert Test Results to JUnit Format
      if: github.event_name == 'pull_request'
      run: find ./test-results -name '*.trx' -exec trx2junit {} \;

    - name: 📑 Publish Test Results as PR Comment
      if: github.event_name == 'pull_request'
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: '**/test-results/*.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: ✅ Add Check Comments for Failed Code Lines
      if: github.event_name == 'pull_request'
      uses: mikepenz/action-junit-report@v3
      with:
        report_paths: '**/test-results/*.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🚀 Log in with Azure (Federated Credentials)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        azd auth login `
          --client-id "$Env:AZURE_CLIENT_ID" `
          --federated-credential-provider "github" `
          --tenant-id "$Env:AZURE_TENANT_ID"

    - name: 🏗️ Provision Infrastructure
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      run: azd provision --no-prompt
      env:
        AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}

    - name: 🔧 Set Azure Environment Variables
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        azd env set ConnectionStrings__openai "$Env:ConnectionStrings__openai"
    
    - name: 🔵 Deploy New Revision (Blue)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        Write-Host "🚀 배포 시작: 새 리비전(Blue) 배포..."
        
        # azd를 통해 앱 이름과 리소스 그룹 정보 가져오기
        $env = azd env get-values
        $rgName = ($env | Where-Object { $_ -match "AZURE_RESOURCE_GROUP" }).Split("=")[1]
        
        # Azure Container App 리소스 정보 가져오기
        $apps = az containerapp list --resource-group $rgName --query "[].name" -o tsv
        $appName = $apps.Split()[0]  # 애플리케이션 이름 추출
        
        # 새 리비전 생성 (트래픽 0%로 시작)
        $revisionSuffix = "rev-$(Get-Date -Format 'yyyyMMddHHmmss')"
        Write-Host "📌 새 리비전 생성 중: $revisionSuffix"
        
        # 애플리케이션 배포 (0% 트래픽 할당)
        azd deploy --no-prompt
        
        # 새 리비전에 태그 추가 및 트래픽 0%로 설정
        az containerapp revision set-traffic --name $appName --resource-group $rgName --revision-weight "$revisionSuffix=0"
        
        # 새 리비전 이름 저장
        echo "NEW_REVISION=$revisionSuffix" >> $GITHUB_ENV
        echo "APP_NAME=$appName" >> $GITHUB_ENV
        echo "RESOURCE_GROUP=$rgName" >> $GITHUB_ENV
      env:
        EnableAzureMonitoring: "true"

    - name: 🩺 Health Check for New Revision
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true'
      shell: pwsh
      run: |
        Write-Host "🩺 새 리비전 상태 확인 중..."
        $appName = $env:APP_NAME
        $rgName = $env:RESOURCE_GROUP
        $revision = $env:NEW_REVISION
        
        # 엔드포인트 URL 가져오기
        $endpoint = az containerapp show --name $appName --resource-group $rgName --query "properties.configuration.ingress.fqdn" -o tsv
        $healthEndpoint = "https://$endpoint/health"  # 헬스 엔드포인트 설정 (프로젝트에 맞게 조정 필요)
        
        # 상태 확인 시도
        $maxAttempts = 5
        $attemptCount = 0
        $isHealthy = $false
        
        while ($attemptCount -lt $maxAttempts) {
          try {
            $attemptCount++
            Write-Host "상태 확인 시도 $attemptCount/$maxAttempts..."
            $response = Invoke-WebRequest -Uri $healthEndpoint -UseBasicParsing -TimeoutSec 30
            if ($response.StatusCode -eq 200) {
              Write-Host "✅ 상태 확인 성공: 새 리비전이 정상적으로 작동합니다."
              $isHealthy = $true
              break
            }
          }
          catch {
            Write-Host "⚠️ 상태 확인 실패. 30초 후 재시도..."
            Start-Sleep -Seconds 30
          }
        }
        
        if (-not $isHealthy) {
          Write-Host "❌ 새 리비전 상태 확인 실패. 배포를 중단합니다."
          exit 1
        }
        
        echo "HEALTH_CHECK_PASSED=true" >> $GITHUB_ENV

    - name: 🔄 Gradual Traffic Shift
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true' && env.HEALTH_CHECK_PASSED == 'true'
      shell: pwsh
      run: |
        Write-Host "🔄 트래픽 점진적 전환 시작..."
        $appName = $env:APP_NAME
        $rgName = $env:RESOURCE_GROUP
        
        # 현재 활성 리비전 찾기 (Green)
        $activeRevision = az containerapp revision list --name $appName --resource-group $rgName --query "[?properties.active && properties.trafficWeight > '0'].name" -o tsv
        $newRevision = $env:NEW_REVISION
        
        Write-Host "📊 현재 활성 리비전: $activeRevision"
        Write-Host "📊 새 리비전: $newRevision"
        
        # 트래픽 점진적 전환 (20% -> 50% -> 100%)
        $trafficSteps = @(20, 50, 100)
        $success = $true
        
        foreach ($percent in $trafficSteps) {
          $remainingPercent = 100 - $percent
          
          Write-Host "📊 트래픽 전환: $percent% 새 리비전, $remainingPercent% 이전 리비전"
          
          if ($activeRevision) {
            az containerapp revision set-traffic --name $appName --resource-group $rgName --revision-weight "$newRevision=$percent" "$activeRevision=$remainingPercent"
          } else {
            az containerapp revision set-traffic --name $appName --resource-group $rgName --revision-weight "$newRevision=$percent"
          }
          
          # 5분 대기하며 앱 상태 모니터링
          Write-Host "⏳ $percent% 전환 후 5분간 모니터링..."
          Start-Sleep -Seconds 300
          
          # 간단한 상태 확인 (실제 구현에서는 보다 정교한 모니터링 필요)
          $endpoint = az containerapp show --name $appName --resource-group $rgName --query "properties.configuration.ingress.fqdn" -o tsv
          $healthEndpoint = "https://$endpoint/health"
          
          try {
            $response = Invoke-WebRequest -Uri $healthEndpoint -UseBasicParsing -TimeoutSec 30
            if ($response.StatusCode -ne 200) {
              $success = $false
              break
            }
          }
          catch {
            Write-Host "❌ 상태 확인 실패. 롤백이 필요합니다."
            $success = $false
            break
          }
        }
        
        if ($success) {
          Write-Host "✅ 트래픽 전환 완료: 새 리비전으로 100% 전환됨"
          echo "TRAFFIC_SHIFT_SUCCESS=true" >> $GITHUB_ENV
          echo "ACTIVE_REVISION=$activeRevision" >> $GITHUB_ENV
        } else {
          Write-Host "❌ 트래픽 전환 중 문제 발생. 롤백합니다."
          # 롤백: 트래픽을 기존 활성 리비전으로 복원
          if ($activeRevision) {
            az containerapp revision set-traffic --name $appName --resource-group $rgName --revision-weight "$activeRevision=100"
          }
          exit 1
        }

    - name: 🧹 Cleanup Old Revisions
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true' && env.TRAFFIC_SHIFT_SUCCESS == 'true'
      shell: pwsh
      run: |
        Write-Host "🧹 불필요한 이전 리비전 정리 중..."
        $appName = $env:APP_NAME
        $rgName = $env:RESOURCE_GROUP
        $activeRevision = $env:ACTIVE_REVISION
        
        # 현재 비활성 상태이고 트래픽이 없는 이전 리비전들 조회 (최신 2개 유지)
        $revisionsToKeep = 2
        $inactiveRevisions = az containerapp revision list --name $appName --resource-group $rgName --query "[?properties.trafficWeight=='0'].name" -o tsv
        
        if ($inactiveRevisions) {
          $revisions = $inactiveRevisions.Split("`n") | Where-Object { $_.Trim() -ne "" }
          
          # 가장 최근 리비전 2개를 제외하고 삭제
          if ($revisions.Count -gt $revisionsToKeep) {
            $revisionsToDelete = $revisions | Select-Object -SkipLast $revisionsToKeep
            
            foreach ($rev in $revisionsToDelete) {
              Write-Host "🗑️ 리비전 삭제 중: $rev"
              az containerapp revision deactivate --name $appName --resource-group $rgName --revision $rev
            }
            
            Write-Host "✅ 이전 리비전 정리 완료"
          } else {
            Write-Host "ℹ️ 정리할 이전 리비전이 없습니다."
          }
        }

    - name: 📊 Set Up Azure Monitor Alerts
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true' && env.TRAFFIC_SHIFT_SUCCESS == 'true'
      shell: pwsh
      run: |
        Write-Host "📊 Azure Monitor 알림 설정 중..."
        $appName = $env:APP_NAME
        $rgName = $env:RESOURCE_GROUP
        
        # 리소스 ID 가져오기
        $resourceId = az containerapp show --name $appName --resource-group $rgName --query id -o tsv
        
        # 기본 알림 설정 - CPU 사용량 경고
        $alertName = "${appName}-cpu-alert"
        az monitor metrics alert create `
          --name $alertName `
          --resource-group $rgName `
          --scopes $resourceId `
          --condition "avg CPU > 80" `
          --window-size 5m `
          --evaluation-frequency 1m `
          --description "컨테이너 앱 CPU 사용량 80% 초과 알림"
        
        # HTTP 4xx, 5xx 오류 알림
        $alertName = "${appName}-http-error-alert"
        az monitor metrics alert create `
          --name $alertName `
          --resource-group $rgName `
          --scopes $resourceId `
          --condition "avg HttpResponseErrors > 10" `
          --window-size 5m `
          --evaluation-frequency 1m `
          --description "HTTP 오류 응답 비율 알림"
        
        Write-Host "✅ 모니터링 알림 설정 완료"

    - name: 🛡️ Configure Diagnostic Settings
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true' && env.TRAFFIC_SHIFT_SUCCESS == 'true'
      shell: pwsh
      run: |
        Write-Host "🛡️ 진단 설정 구성 중..."
        $appName = $env:APP_NAME
        $rgName = $env:RESOURCE_GROUP
        
        # 리소스 ID 가져오기
        $resourceId = az containerapp show --name $appName --resource-group $rgName --query id -o tsv
        
        # Log Analytics 워크스페이스 확인 또는 생성
        $workspaceName = "${appName}-logs"
        $workspace = az monitor log-analytics workspace list --resource-group $rgName --query "[?name=='$workspaceName'].id" -o tsv
        
        if (-not $workspace) {
            Write-Host "🔧 Log Analytics 워크스페이스 생성 중..."
            $workspace = az monitor log-analytics workspace create `
              --resource-group $rgName `
              --workspace-name $workspaceName `
              --query id -o tsv
        }
        
        # 진단 설정 구성
        az monitor diagnostic-settings create `
          --name "${appName}-diagnostics" `
          --resource $resourceId `
          --logs '[{"category": "ContainerAppSystemLogs","enabled": true},{"category": "ContainerAppConsoleLogs","enabled": true}]' `
          --metrics '[{"category": "AllMetrics","enabled": true}]' `
          --workspace $workspace

    - name: 🔄 Set Up Auto-Scaling Rules
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.test-status.outputs.tests_passed == 'true' && env.TRAFFIC_SHIFT_SUCCESS == 'true'
      shell: pwsh
      run: |
        Write-Host "🔄 자동 확장 규칙 구성 중..."
        $appName = $env:APP_NAME
        $rgName = $env:RESOURCE_GROUP
        
        # HTTP 요청 기반 자동 확장 설정
        az containerapp update `
          --name $appName `
          --resource-group $rgName `
          --min-replicas 1 `
          --max-replicas 10 `
          --scale-rule-name http-scale-rule `
          --scale-rule-http-concurrency 50 `
          --scale-rule-http-concurrency-threshold 100
        
        # CPU 기반 자동 확장 설정 추가 (명령 라인에서 지원되는 경우)
        # Azure CLI에서 지원하는지 확인 필요
        try {
          az containerapp scale-rule add `
            --name $appName `
            --resource-group $rgName `
            --rule-name cpu-rule `
            --type cpu `
            --metadata type=Utilization threshold=70
        } catch {
          Write-Host "ℹ️ CPU 기반 자동 확장은 Azure CLI에서 완전히 지원되지 않을 수 있습니다."
        }

    - name: 📢 Deploy Automated Notification Logic App
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.TRAFFIC_SHIFT_SUCCESS == 'true'
      shell: pwsh
      run: |
        Write-Host "📢 알림 자동화를 위한 Logic App 배포 중..."
        $appName = $env:APP_NAME
        $rgName = $env:RESOURCE_GROUP
        $logicAppName = "${appName}-notifications"
        
        # Logic App이 이미 있는지 확인
        $existingLogicApp = az logic workflow list --resource-group $rgName --query "[?name=='$logicAppName'].id" -o tsv
        
        if (-not $existingLogicApp) {
            # Logic App 정의 - 이메일 알림 예시 (실제 환경에 맞게 조정 필요)
            $workflowDefinition = '{
                "definition": {
                    "$schema": "https://schema.management.azure.com/providers/Microsoft.Logic/schemas/2016-06-01/workflowdefinition.json#",
                    "actions": {
                        "Send_an_email": {
                            "inputs": {
                                "body": {
                                    "Body": "애플리케이션이 성공적으로 배포되었습니다.\n\n애플리케이션: @{triggerBody()?[\'appName\']}\n리비전: @{triggerBody()?[\'revision\']}\n배포 시간: @{utcNow()}",on\']} \n🕒 *배포 시간*: @{utcNow()} \n📝 *상태*: @{triggerBody()[\'status\']} \n\n@{triggerBody()[\'details\']}"
                                    "Subject": "배포 알림: @{triggerBody()?[\'appName\']}",
                                    "To": "team@example.com"
                                },  "Content-Type": "application/json"
                                "host": {
                                    "connection": {
                                        "name": "@parameters(\'$connections\')[\'office365\'][\'connectionId\']"FDHSzMxVK"
                                    }
                                },ter": {},
                                "method": "post",
                                "path": "/v2/Mail"
                            },
                            "type": "ApiConnection"
                        }uts": {},
                    },arameters": {},
                    "contentVersion": "1.0.0.0",
                    "outputs": {},{
                    "parameters": {": {
                        "$connections": { {
                            "defaultValue": {},": {
                            "type": "Object"Name": {
                        }                   "type": "string"
                    },                  },
                    "triggers": {       "revision": {
                        "manual": {         "type": "string"
                            "inputs": { },
                                "schema": {atus": {
                                    "properties": { "string"
                                        "appName": {
                                            "type": "string"
                                        },  "type": "string"
                                        "revision": {
                                            "type": "string"
                                        }": "object"
                                    },
                                    "type": "object"
                                }": "Http",
                            },ype": "Request"
                            "kind": "Http",
                            "type": "Request"
                        }
                    }
                }
            }'Logic App 배포
            Write-Host "🔧 새 Logic App 생성 중..."
            # Logic App 배포low create --resource-group $rgName --name $logicAppName --definition "$workflowDefinition"
            Write-Host "🔧 새 Logic App 생성 중..."p 배포 완료"
            az logic workflow create --resource-group $rgName --name $logicAppName --definition "$workflowDefinition"
            Write-Host "✅ Logic App 배포 완료"재합니다: $logicAppName"
        } else {
            Write-Host "ℹ️ Logic App이 이미 존재합니다: $logicAppName"
        }   $workflowDefinition = '{
                "definition": {
        # Logic App 엔드포인트는 실제 환경에서 저장하고 사용해야 함.management.azure.com/providers/Microsoft.Logic/schemas/2016-06-01/workflowdefinition.json#",
        # 여기서는 시연 목적으로 표시만 함": {
        Write-Host "✅ 자동화된 알림 시스템 구성 완료" {
                            "inputs": {
    - name: 📢 Send Deployment Notification
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()]} \n\n✅ *애플리케이션*: @{triggerBody()[\'appName\']} \n📦 *리비전*: @{triggerBody()[\'revision\']} \n🕒 *배포 시간*: @{utcNow()} \n📝 *상태*: @{triggerBody()[\'status\']} \n\n@{triggerBody()[\'details\']}"
      shell: pwsh               },
      run: |                    "headers": {
        $deploymentSuccess = $env:TRAFFIC_SHIFT_SUCCESSplication/json"
        $appName = $env:APP_NAME},
        $newRevision = $env:NEW_REVISION: "POST",
                                "uri": "https://hooks.slack.com/services/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"
        # Slack 알림 준비
        if ($deploymentSuccess -eq "true") {
          $status = "성공"                  "type": "Http"
          $details = "Blue/Green 배포가 성공적으로 완료되었습니다."
          Write-Host "✅ 배포 성공! 애플리케이션 $appName의 새 리비전 $newRevision이 성공적으로 배포되었습니다."
        } else {
          $status = "실패"
          $details = "배포 중 오류가 발생했거나 롤백되었습니다. GitHub Actions 로그를 확인해주세요."},
          Write-Host "❌ 배포 실패 또는 롤백됨. 자세한 로그를 확인해주세요."
        }
        "inputs": {
        # Slack 웹훅으로 직접 알림 전송                      "schema": {
        $slackPayload = @{
          text = "🚀 *배포 알림*: $appName `n`n✅ *애플리케이션*: $appName `n📦 *리비전*: $newRevision `n🕒 *배포 시간*: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') `n📝 *상태*: $status `n`n$details"
        } | ConvertTo-Json                                  "type": "string"
        
        try {                              "revision": {
          $slackWebhookUrl = "https://hooks.slack.com/services/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"                            "type": "string"
          Invoke-RestMethod -Uri $slackWebhookUrl -Method Post -Body $slackPayload -ContentType "application/json"
          Write-Host "✅ Slack 알림이 성공적으로 전송되었습니다."                              "status": {
        } catch {                       "type": "string"
          Write-Host "⚠️ Slack 알림 전송 중 오류가 발생했습니다: $_"            },
        }
              "type": "string"
        # Logic App을 통한 알림 전송 (백업 메서드)     }
        if ($env:LOGIC_APP_TRIGGER_URL) {
          try {"object"
            $logicAppPayload = @{    }
              appName = $appName                   },
              revision = $newRevision                            "kind": "Http",























        Write-Host "📊 배포 메트릭이 Azure Monitor에 기록되었습니다."                } | ConvertTo-Json          details = $details          event = $eventType          revision = $newRevision          applicationName = $appName          timestamp = (Get-Date).ToUniversalTime().ToString("o")        $customEvent = @{        $eventType = if ($deploymentSuccess -eq "true") { "deployment_success" } else { "deployment_failure" }        # Azure Monitor에 이벤트 기록                }          }            Write-Host "⚠️ Logic App 알림 전송 중 오류가 발생했습니다: $_"          } catch {            Write-Host "✅ Logic App을 통한 알림이 성공적으로 전송되었습니다."            Invoke-RestMethod -Uri $env:LOGIC_APP_TRIGGER_URL -Method Post -Body $logicAppPayload -ContentType "application/json"                        } | ConvertTo-Json              details = $details              status = $status                            "type": "Request"
                        }
                    }
                }
            }'
            
            # Logic App 업데이트
            az logic workflow create --resource-group $rgName --name $logicAppName --definition "$workflowDefinition" --update
            Write-Host "✅ Logic App을 Slack 알림으로 업데이트 완료"
        }
        
        # Logic App 트리거 URL 가져오기
        $logicAppTriggerUrl = az logic workflow trigger list --resource-group $rgName --workflow-name $logicAppName --query "[0].workflow.id" -o tsv
        
        if ($logicAppTriggerUrl) {
            Write-Host "🔗 Logic App 트리거 URL 저장 중..."
            echo "LOGIC_APP_TRIGGER_URL=$logicAppTriggerUrl" >> $GITHUB_ENV
        } else {
